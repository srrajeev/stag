name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy main to /test-website/
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: test-website
          exclude_assets: '.github,.gitignore,atos/*.py,fix_*.py,reapply_theme.py,switch_picsum.py,upgrade_html.py,add_photos.py'

      - name: Deploy staging to /stag/travel_planner/
        if: github.ref_name == 'staging'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: stag/travel_planner
          exclude_assets: '.github,.gitignore,atos/*.py,fix_*.py,reapply_theme.py,switch_picsum.py,upgrade_html.py,add_photos.py'
