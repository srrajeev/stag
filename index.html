<html lang="en">

  <title>Test Website - srrajeev</title>
  <style>

      display: flex;

      display: inline-block;
      background: #238636;
      color: white;
      padding: 6px 16px;

      font-weight: 600;

    a { color: #58a6ff; }

<body>
  <div class="card">
    <h1>🚀 Hello World!</h1>
    <p>This is a test website deployed via <strong>GitHub Pages</strong> by Hermes Agent.</p>

    <p style="margin-top:20px; font-size:0.85rem;">
